# Nombre del flujo de trabajo
name: push

# Cuando se debe ejecutar el flujo de trabajo
on:
  push:

# Permisos para el flujo de trabajo
permissions:
  contents: write

# Se definen los trabajos que se ejecutarán
jobs:
  # Validaciones de código
  validate:
    name: 'Validar código'
    runs-on: ubuntu-latest
    steps:
      - name: Subir el código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache de dependencias
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar tipos TypeScript
        run: pnpm run tsc

      - name: Ejecutar linter
        run: pnpm run lint

      - name: Ejecutar tests
        run: pnpm test

  # Build del proyecto (solo si las validaciones pasan)
  build:
    name: 'Compilar proyecto'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Subir el código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build del proyecto
        run: |
          # Para React Native, podrías usar:
          # npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle
          echo "Build completado exitosamente"
